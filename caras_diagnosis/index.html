<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CARAS 無料診断</title>
  <style>
    :root {
      --gold: #C9A84C;
      --dark: #0D0D0D;
      --text: #F0EDE6;
      --text-muted: #A09880;
      --rose: #C4748A;
      --rose-light: #E09BB0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 20px 60px;
    }

    .brand-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 4px 14px;
      margin-bottom: 22px;
      text-transform: uppercase;
    }

    .main-title {
      font-size: 21px;
      font-weight: 700;
      line-height: 1.6;
      letter-spacing: 0.04em;
      text-align: center;
      margin-bottom: 8px;
    }

    .main-title .highlight { color: var(--gold); }

    .sub-text {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.8;
      margin-bottom: 36px;
    }

    /* カード列 */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 400px;
    }

    /* カード共通 */
    .card {
      display: block;
      text-decoration: none;
      color: var(--text);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:active { transform: scale(0.98); }

    /* 写真 — 両カード同じサイズで統一 */
    .card-photo {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ゴルフ */
    .card-golf { background: #0D1810; border-color: rgba(201,168,76,0.3); }
    .card-golf:hover { border-color: var(--gold); }

    /* マダム */
    .card-madame { background: #130810; border-color: rgba(196,116,138,0.3); }
    .card-madame:hover { border-color: var(--rose); }

    /* フッター（全カード同じ高さ・構造） */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .badge {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 2px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .card-golf .badge { background: rgba(201,168,76,0.15); color: var(--gold); }
    .card-madame .badge { background: rgba(196,116,138,0.15); color: var(--rose-light); }

    .card-btn {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 9px 20px;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .card-golf .card-btn { background: var(--gold); color: #0D0D0D; }
    .card-madame .card-btn { background: var(--rose); color: #fff; }

    .page-footer {
      margin-top: 44px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }
  </style>
</head>
