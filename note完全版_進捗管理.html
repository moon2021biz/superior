<style>

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;padding:24px 16px 80px}

/* ─── HEADER ─── */
.header{max-width:1080px;margin:0 auto 28px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header h1{font-size:19px;font-weight:800;color:var(--accent);letter-spacing:.04em;margin-bottom:4px}

.progress-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;min-width:250px}
.pb-label{font-size:11px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}
.pb-label span{color:var(--accent);font-weight:700}
.bar-outer{background:var(--border);border-radius:99px;height:8px;overflow:hidden;margin-bottom:10px}
.bar-inner{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#f5d060);transition:width .4s}
.pb-stats{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--text2)}
.pb-chars{font-size:11px;color:var(--text2);margin-top:8px}
.pb-chars strong{color:var(--accent)}

/* ─── FILTER ─── */
.filter-bar{max-width:1080px;margin:0 auto 16px;display:flex;gap:6px;flex-wrap:wrap}
.fbtn{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:99px;padding:5px 14px;font-size:11px;cursor:pointer;transition:all .15s;font-weight:600}
.fbtn:hover,.fbtn.active{background:var(--accent);border-color:var(--accent);color:#000}

/* ─── CARD ─── */
.list{max-width:1080px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:rgba(232,160,32,.35)}

/* step accent colors */
.card[data-step="0"]{border-left:3px solid var(--border2)}
.card[data-step="1"]{border-left:3px solid var(--accent2)}
.card[data-step="2"]{border-left:3px solid var(--purple)}
.card[data-step="3"]{border-left:3px solid var(--yellow)}
.card[data-step="4"]{border-left:3px solid var(--cyan)}
.card[data-step="5"]{border-left:3px solid var(--accent)}
.card[data-step="6"]{border-left:3px solid var(--green)}

/* ─── CARD TOP ─── */
.card-top{display:grid;grid-template-columns:52px 1fr auto;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none}
.ch-num{font-size:10px;font-weight:700;color:var(--text3);text-align:center;line-height:1.3}
.ch-num span{display:block;font-size:19px;color:var(--text);font-weight:800}
.ch-title{font-size:14px;font-weight:700;line-height:1.5}
.ch-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* ─── PIPELINE ─── */
.pipeline{display:flex;gap:0;align-items:center;flex-shrink:0}
.step-node{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:0 4px;position:relative}
.step-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;position:relative}
.step-dot.done{background:var(--green);border-color:var(--green);color:#000;font-weight:900}
.step-dot.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,160,32,.25)}
.step-label{font-size:9px;color:var(--text3);white-space:nowrap;max-width:40px;text-align:center;line-height:1.3}
.step-line{width:12px;height:2px;background:var(--border2);flex-shrink:0;margin-bottom:13px}
.step-line.done{background:var(--green)}

/* ─── DETAIL ─── */
.card-detail{display:none;border-top:1px solid var(--border);background:var(--surface2)}
.card-detail.open{display:block}

.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 16px 0 68px;gap:2px;overflow-x:auto}
.tbtn{padding:9px 14px;font-size:11px;font-weight:700;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tbtn:hover{color:var(--text2)}
.tbtn.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab-pane{display:none;padding:16px 16px 20px 68px}
.tab-pane.active{display:block}

.pipe-step-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s}
.pipe-step-card:hover{border-color:rgba(232,160,32,.4)}
.pipe-step-card.current-step{border-color:var(--accent);background:rgba(232,160,32,.06)}
.pipe-step-card.completed-step{border-color:var(--green);background:rgba(62,207,110,.05)}

.psc-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}

## こんな声かけ、していませんか？

「もっと早く足を動かして！」

「フォームをちゃんとしなさい！」

「前の子に追いつけ、もっと速く！」

お子さんが走るとき、こういう声をかけたことがある方は多いと思います。気持ちはよくわかります。我が子に速くなってほしい、というごく自然な親心からくる言葉です。

でも、最初に正直に言わせてください。

**その声かけ、すべて逆効果かもしれません。**

「え、なんで？」と思った方、安心してください。この本を読み終えるころには、その理由がはっきりわかります。そして「じゃあ何をすればいいか」まで、具体的に見えているはずです。

僕は荻田大樹（おぎた ひろき）、「おぎぃ。」と呼ばれています。2016年リオデジャネイロオリンピック、棒高跳びの日本代表として出場しました。現在は兵庫県で陸上スクールを3拠点運営し、ECCかけっこスクールのプログラム監修も務めています。毎日、小学生の走りを見続けています。

その現場で日々感じていることがあります。

> 子どもの走りは、関わり方ひとつで大きく変わる。速くなれない子などいない。ただ、「正しいタイミングに、正しい関わり方」ができていないだけだ。

この本は、その「正しいタイミングと関わり方」を、発達科学と競技経験の両方から丁寧に解説する一冊です。

## 五輪の舞台で見た「速さの本質」

世界陸上でウサイン・ボルト選手を目の前で見たとき、最初に感じたことは「意外と、足が速く動いているわけじゃないな」ということでした。

もっと正直に言うと——「力んでいない」と感じた。

ボルトが速いのは、足の動きが人間離れしているからではありません。地面についた瞬間に「短い時間で大きな力を加え」、それを推進力に変換する効率が圧倒的なのです。しかもそれを、力みなくやっている。

速さの本質は、**筋力・体の使い方・タイミング**の3要素で決まります。でもその中で最も大切なのは「タイミング」と「体の使い方」——特に、**力みすぎないこと**です。

ボールを投げるとき、腕を力ませると速い球は投げられない。走ることも同じ構造です。

> 力めば力むほど、速度は出ない——これが人の体の構造。

世界のトップを見続けてわかったのは、「どうやって大きな力を出すか」より**「どうやって力を抜いて最大出力を引き出すか」が速さの本質**だということです。

「速く走る＝たくさん頑張る」ではない。これがすべての出発点です。

## 「速い」の正体を解体する

では、速さとは何か。陸上の世界では次の式で表されます。

**スピード＝ストライド（1歩の幅）× ピッチ（足の回転数）**

つまり速さとは、「どれだけ大きな1歩を踏み出せるか」と「どれだけリズムよく足を動かせるか」の掛け算です。

そしてこの方程式には、**「接地の質」**という隠れた要素があります。

走っているとき、お子さんの足音に注目したことはありますか？

- 「ザッザッ」という擦れる音 → つま先で地面を突き刺している
- 「シュタシュタ」という重い音 → かかとでブレーキをかけている
- **「たったっ」という乾いた軽い音 → これが理想**

足の裏の前半部分で地面をとらえ、余計な力を使わずに反発をもらう。地面をペダルのように「踏む」感覚——この接地の質が、スピードを大きく左右します。

ここで「足を速く動かせ」という声かけが何をするか、改めて考えてみてください。足を素早く動かそうとすると、1歩1歩の幅が縮まります。足はたくさん動いているのに体が前に進まない——これが「ちょこちょこ走り」です。

**ストライドが小さくなれば、いくら足を動かしても重心は前に進まない。**

速さの構造を知ると、「足を速く動かせ」という声かけがいかに的外れかがわかります。

## 「早く足を動かせ！」、もう2つの逆効果

「足を速く動かす＝ストライドが縮む＝遅くなる」——これは前のセクションで説明しました。でも、この声かけの問題はそれだけではありません。

**逆効果その2：重力が使えなくなる**

走るとき、体を少し前に傾けると「重力が推進力に変わる」感覚があります。前に倒れそうになる重力を、前への動力として使う。だから速いランナーは、走り始めのとき前傾姿勢になるのです。

ところが「足を速く動かそう」と意識すると、次の足を早く出そうとするあまり、体が傾く前に着地してしまいます。**重力の力をもらう前に走り出してしまう**——せっかくの推進力を、みずから捨てている状態です。

**逆効果その3：本番で崩れやすくなる**

「ちょこちょこ走り」は力みやすい走り方です。運動会や試合のような緊張する場面で力むと、さらに足が細かくなります。普段の練習では速く走れていた子が、本番で実力を出せない——この悪循環の多くは、ここから来ています。

まとめると、「早く足を動かせ！」という声かけは3重の逆効果をもたらします。

1. **ストライドを失う**（足を速く動かすほど1歩が小さくなる）
2. **重力が使えなくなる**（前傾を作る前に着地してしまう）
3. **本番で力みやすくなる**（緊張×ちょこちょこ走りの悪循環）

善意の言葉が、子どもの走りを壊している。これが現場で起きている現実です。

## 「正しいフォームを教えれば解決する」——それも違います

「じゃあフォームをちゃんと教えればいいんじゃないか」

そう思った方、少し待ってください。

実は、フォームの指導が逆効果になるケースも多く存在します。第3章で詳しく解説しますが、**子どもの発達段階を無視した技術指導は、むしろ走りを固くして遅くする**ことがあります。

「きれいに走れるようになったのに、タイムが落ちた」という現象。僕が現場で何度も見てきた光景です。

大切なのは「何を教えるか」ではなく、「いつ・どんな形で関わるか」です。その答えは、子どもの脳と身体の発達の仕組みの中にあります。

世の中には「速く走るための方法」があふれています。でも多くは、大人やトップ選手向けの内容をそのまま子どもに当てはめたものです。

一つ、はっきり言わせてください。

**トップ選手に必要な動きと、子どもたちに必要な動きは違います。**

筋力のない子どもに「トップ選手と同じ動き」を求めるのは、土台なく高いビルを建てるようなものです。体への負担だけでなく、発達段階特有のリスクにもつながります。

早く動く能力が高い子、丁寧に動く能力が高い子——子どもによって特性はまったく違います。一律の指導ではなく、その子に合ったアプローチが必要で、そのための「見方と関わり方」をこの本で渡します。

小学校の今から、中学・高校・その先まで。オリンピックという最終到達点から逆算して「今この子に何が必要か」を示せること——これがこの本の、他にはない強みです。

この本を読み終えたとき、こう感じてほしい。

## 4要素──接地・推進・姿勢・リズムとは何か

1秒間の走りを、スーパースローで見てみてください。

足が地面に着く瞬間がある。
着いた足で身体を前に運ぶ瞬間がある。
両足が宙にある一瞬がある。
そしてまた、もう一方の足が地面に着く。

この1サイクルを、4つの観点から眺めると走りが見えてきます。

**接地（せっち）**：足を地面に着けること。
ブレーキをかけすぎず、体が綺麗に「乗る」位置に足が触れるイメージ。縄跳びを連続で跳ぶときの、足裏でポンと地面に触れる感覚。それを「走る」という動作の中で再現することが、正解形に最も近い動きです。

**推進**：地面を後ろに押して、身体を前に進めること。
大人にとっては大きな前傾角度から大きな筋力で押し出す動きですが、小学生にとっては「重心を崩し、重力で生まれる傾きを足が支えることで前に進む」という、もう少し受け身に近い動きになります。ここが大人とまったく違う部分で、後ほど詳しく書きます。

**姿勢**：身体重心と、各パーツの位置関係。
「まっすぐ立っていればいい」ではありません。地面に正しく力を加えられる位置に身体が乗っているか、その状態を一歩一歩、崩さずに保てているかが問われます。多少ジグザグしていてもいい。重要なのは「適切に力を伝えられる姿勢で、体が地面に「落ちて」いるか」です。

**リズム**：脚の動きの時間配分。
1秒に何回足が地面に着くか、地面に着いている時間と離れている時間のバランスです。スタート直後と最高速度のときでは、リズムはまったく違います。リズムが整わないと、せっかく出力できる力も、最終的なスピードに変換されません。

---

この4つが、走りの全部。
そして大事なのは、**この4つが互いに支え合って初めて、走るという動きが成立する**という点です。

たとえば接地がブレーキ気味になっていると、推進で生まれた力の半分以上が失われます。姿勢が崩れていれば、接地位置は毎歩ばらつきます。リズムが乱れれば、力を入れるべき瞬間に入れられない。

逆に言えば、どこか一つを整えると、ほかの要素も連動して整っていく。

小学生の指導では、走りを「全体としていじる」のではなく、4つの要素を一つずつ、それぞれに対応したドリル（部分練習）で磨いていくほうが、結果として走り全体が整います。これが、私が陸上スクールの現場で何年も繰り返して得た実感です。

## 小学生の身体と神経で、今この瞬間に起きていること

ここから先の話を読む前に、ぜひ一度、お子さんの身体の中で起きている"工事中"の様子を想像してみてください。

成長期の小学生の身体は、ものすごく簡単に言えば**「未完成の建物に、毎日階を増築している状態」**です。設計図は決まっているけれど、足場が組まれていない箇所がたくさんある。土台の鉄筋が固まる前に、屋根まで建材を運ぼうとすると壊れる。そんなイメージです。

具体的に、何が起きているか。

**① 筋肉の発達が「完成」していない**

骨が伸びるスピードに筋肉の発達が追いつかないので、筋肉は常に少し引っ張られた状態にあります。出力（力を発揮する力）も簡単には上がらないし、トレーニングで筋肉を太くしようとしても、身体のエネルギーが「身長を伸ばすほう」へ優先的に回されるので、なかなか筋肥大しません。**だから小学生に重りを担がせるトレーニングは怪我のリスクも踏まえて「費用対効果がとても低い」**、ということが、ここから当然のように出てきます。

**② 頭が大きく、足はまだ発達途中**

特に低学年（6〜8歳）は、体型自体が大人とまったく違います。重心の位置が高く、不安定。バランスを取る基準が大人と違うので、大人と同じフォームを真似させても、そもそも釣り合いが取れません。

**③ 成長で「感覚」が日々ずれていく**

人間の身体は、脚の長さがおおよそ身長の45〜50%、腕の長さがおおよそ40〜45%を占めるとされており、特にプレ思春期から思春期の成長スパートでは**下肢（脚）の伸びが先行する**ことが知られています。たとえば140cmから150cmへ10cm伸びるとき、脚はおおよそ5〜6cm、腕はおおよそ4〜5cm長くなる計算で、しかも上半身と下肢の伸びがアンバランスになりやすい時期です。
「ここに足があるはず」「ここまで腕が届くはず」という昨日までの感覚が、今日には少しずつズレている。

大人になると身体の感覚は一度つかんでしまえば定着しますが、成長期の子どもはそれが**毎日のように更新**されていきます。ぎこちなく見える時期があるのは、感覚と実体が同期し直している最中の証拠です。

**④ 骨や腱が柔らかい**

怪我はしにくい一方で、大きな負荷が繰り返しかかると、まだ硬くなりきっていない骨や腱の付着部分にダメージが入ります。実際、9〜12歳前後に多く発症するシーバー病（踵に痛みが出る踵骨骨端症）や、オスグッド・シュラッター病（脛骨上部の痛み）は、まさにこの時期の**骨端線**（骨が縦に伸びるための「成長の窓」）への繰り返し負荷で起きる代表的なスポーツ障害です。骨端線はまだ硬くなりきっていないため、繰り返しの衝撃や引っ張る力に弱い。**走り込みすぎ・跳び込みすぎは、本気で禁物**です。

**⑤ 動作がまだ自動化されていない**

大人は歩き方や走り方を意識せずできますが、子どもは毎回少しずつ違う動きをしてしまうことがあります。これは脳と身体のあいだに、まだ「専用回線」が引かれていないからです。神経が「あ、この動きはこの順番で出すと一番効率的だ」という配線を、繰り返しの中から自分で作っていっている最中。

**⑥ 感覚は、知らないうちに更新し続けられている**

私のスクールで、半年ぶりに会う子がいると、本当に身体つきが変わっています。「あれ、こんなに走り方が違う子だったかな」と感じて、半年前の動画を確認すると、まるで別人のように走り方が変わっていることがある。

これは、その子の身体が成長したから、というだけではありません。**成長した新しい身体の感覚に、その子の脳がやっと追いついた**結果として、別人のように見えるのです。

毎日少しずつズレ続けている感覚を、毎日少しずつ更新し直す作業を、子どもは無意識のうちに自分でやっています。私たち大人ができるのは、その更新作業をジャマしないこと。それだけです。

**⑦ 言葉での理解と、身体での再現がズレている**

ここが、保護者と指導者が一番誤解しやすい部分です。
小学生を「言葉で説明して理解させる」のは、大人より圧倒的に難しいです。「もっと膝を上げて」と言われても、「どのくらい？」「どうやって？」と混乱し、それを指導者が「狙った動き」に翻訳して再現する力がまだ弱い。

一方で、「身体で表現して覚える」のは、大人より圧倒的に速い。これが、よく言われる**ゴールデンエイジ（神経系の発達が最も盛んな時期）**の正体です。

つまり、子どもは「言葉（変換や推測が必要なもの）で教えると伝わらないが、動作（直感的で具体的なもの）で示すと一瞬で吸収する」。
ここを理解せずに大人と同じ言葉で指導してしまうと、いいトレーニングをしているつもりが、ぜんぶ素通りしていきます。それは結果として、間違った指導になってしまう。

このことだけは、本書の中で繰り返し書いていきます。

## 変えていいもの・変えなくていいもの・アプローチを変えるもの

ここまでの前提を踏まえて、4要素を「小学生の段階で、いじっていいかどうか」で分類し直すと、こうなります。

　　▼ **積極的に変えていい3要素**
　　　・**接地**
　　　・**姿勢**
　　　・**リズム**

　　▼ **アプローチを変える1要素**
　　　・**推進**　── 筋力で作らない。重力と"おっとっと"で作る。

順番に説明します。

### 接地 ── 「ポンと跳ねる足」を作る

接地の理想は、ブレーキをかけない位置に足が"乗る"こと。
イメージは、ここまで何度か書いている通り、**縄跳びの連続跳び**です。

縄跳びを跳んでいるとき、足の裏は地面にベタッと張りつきません。足首と膝の関節がほどよく弾み、ポンと触れて、ポンと離れる。ぐにゃっと潰れていたら、長く跳び続けられない。子どもは何度も縄跳びをするうちに、これを自分で発見していきます。

走るときも、片足支持で、身体が前に進みながら、同じ"ポンと弾む"瞬間を短い時間のうちに作れるかどうか。ここが、接地の核心です。

足首・膝・股関節の使い方、足の裏のどこで地面を捉えるか、そして重心がスムーズに無理なく進める場所に乗っているかどうか。すべて、接地という1点に集約されてきます。

### 姿勢 ── まっすぐが正解じゃない

姿勢について、保護者の方が最も誤解されているのが「まっすぐ走らせる」という言葉です。

走っている小学生を後ろから見ると、多くの子は身体が左右にぐらつきます。これは欠陥ではありません。むしろ、適切な位置に力を加えるために、身体が小さく調整を入れている結果として現れているケースがほとんどです。

姿勢で見るべきは「直線かどうか」ではなく、**「地面に力を加えるその瞬間に、重心が正しく足の上に乗っているか」**です。ジグザグでもいい。重心がスムーズに、無理なく進める場所に乗っているなら、姿勢としては合格です。

そしてもうひとつ、姿勢は「動きの結果」でもあるという視点を持ってください。関節の硬さ、自分の身体への反応、運動への反応に合わせて、その子なりの正解の姿勢が形作られます。**他人の正解を押し付けない**。これが姿勢を見るときの基本姿勢（言葉遊びではなく、本当に）です。

### リズム ── 外から先に、内へ移す

リズムは、最初は耳から入れます。
手を叩く、口で「タンタンタン」と言う、メトロノームを使う。**外的な刺激と、自分の脚の動きを合わせる**ところから始めます。

子どもがそれに慣れてきたら、今度は逆に「今の自分のリズム、どう感じる？」と本人の触覚に問いを返す。リズムを"自分の身体の内側で感じる感覚"へ持っていく。

ここまで来ると、同じ全力疾走でも「リズムを少し遅くしてストライドを伸ばす」「リズムを早くしてピッチで走る」というコントロールが効くようになります。これが将来、中学校・高校で技術指導が入ったときに、ものすごく効いてきます。

### 推進 ── 押さないで、倒れる

そして、推進。
大人は筋力で地面を押して前に進みますが、小学生にこれをやらせると、**ほぼ全部裏目に出ます**。

筋発揮で押そうとすると、力みが入ります。力みが入ると、接地がブレーキになります。接地がブレーキになると、姿勢が崩れ、リズムも乱れる。**4要素が連鎖して全部崩れる**のです。

小学生の推進で使ってほしいのは、**重力**です。
身体を少し前に倒すと、勝手に前に進もうとする力が生まれます。足はそれを受け止め、「おっとっと」の力を使う。「押す」のではなく、「倒れる重さを支え、地面を介して進む力に変換する」。スタートの構えから走り出すあの最初の数歩こそ、この感覚が出やすい瞬間です。

スタートだけは、力で押すのではなく、**支える（スタビリティ）→倒れる→受け止める**、の順で身体を運ぶ意識でやってもらえると、推進の感覚が育ちやすくなります。

## 優先順位は決まっている：接地 → 姿勢 → リズム → 推進

4要素は、最終的には同時に整える必要があります。が、もし「どこから手をつけるか」と聞かれたら、私は迷いなくこの順番で答えます。

**① 接地**
**② 姿勢**
**③ リズム**
**④ 推進**

理由はシンプルで、**接地が崩れていると、後の3要素は何をやっても土台が抜ける**から、です。

地面に正しく力を加えられない位置で足が着いていれば、その時点で身体は地面から押し返してもらえません。押し返してもらえない以上、姿勢を整える機会も生まれず、リズムを取る相手も失われ、推進への変換ロスがどこまでも大きくなります。

逆に接地が整うと、次の足を着くまでの空中時間で、姿勢が自然に整い始める。姿勢が整えば、左右のブレが減り、結果としてリズムが揃う。リズムが揃えば、力を入れるべき瞬間が分かり、そこに推進の力を乗せていける。

**接地 → 姿勢 → リズム → 推進**は、走りという建物を建てるときの「鉄筋・土台・骨組み・屋根」の順番だと思ってください。

そして、その鉄筋を最短で身体に入れる教材が**縄跳び**であり**ケンケン**です。

縄跳びでは、両足支持で「全身を固めてバネのように使う」感覚が入る。ケンケンでは、それを片足支持で実現する感覚が入る。たったこの2つを毎日数分やっているだけでも、接地の質はじわじわ変わっていきます。

実際に私が見てきた現場では、**ケンケンが安定してできるようになる頃には、ほかの要素も足並みを揃えるように整い始め、結果として50m走で1秒以上タイムが縮む子が珍しくありません**。

印象に残っている子の話を、少しだけ書いておきます。

入校した当初、ケンケンが指定のゴールまで続けられず、崩れていた子がいました。脚力ではなく、片足支持で身体を安定させる感覚がまだ育っていない状態でした。スプリントに関するアドバイスはほどほどに、ケンケンのベースを継続しました。20歩、30歩と続けられるようになった頃、その子の50m走のタイムは、入校時から1秒以上縮みました。

その子が私に言ったのが、「最近、走るのが楽になって楽しい。」という一言でした。

楽になる、というのは、4要素が整い始めたサインです。
力で押していた走りから、力を効率よく伝えるだけで進む走りに変わっていく。
本人が感じる「楽さ」は、私たち指導者にとっての、何よりの答え合わせなのです。

## 走りが変わる瞬間は、タイムより前に"ケンケン"に現れる

私はうちのスクールで、基本的にタイムを測りません。

意外に思われるかもしれませんが、「タイムを測らずに、何で走りの変化を判断するんですか？」と本当によく聞かれます。

答えは、**ケンケンを見ています**。

軽やかにポンポンと、毎回毎回同じ姿勢でケンケンを跳んでいる子。
これは、もう確実に走るのが速くなった、と判断します。

逆に、ケンケンのスピードがそれなりに速くても、ジャンプの形が毎回違う子。これは、たとえ今日の50m走でタイムが出ていたとしても、まだ"安定して速い"の段階には来ていません。

なぜなら、走るという動作は、ケンケンの片足支持を、左右交互に・前進しながら・もっと短い時間で繰り返す動作だからです。**ケンケンが安定していない子の走りは、そもそも片足支持の基準がブレている**ということなので、**本人の本当の限界スピードよりも、ずっと手前の速度で頭打ちになります**。ここは本当に大事なところなので、もう一度書きます──**ケンケンが安定していない子は、その子が本来出せるはずだったスピードに、まだ届いていない**のです。

タイムの上下は、その日の気分や風や調子で簡単に変わります。
ケンケンの質は、その子が本当に身体を扱えるようになったかどうかを、もっと正直に映します。

「タイムが出ない＝走りが変わっていない」とは限らない。
むしろ、**ケンケンが変わったタイミングの少しあとから、タイムは追いかけてきます**。

ここを、ぜひ覚えておいてください。

## 「教えていない」のに、現場で起きていること

ひとつ、私のスクールに特徴的なことを書いておきます。

私は、スプリント（短距離走そのもの）の指導を、ほとんどやりません。
スタートも、クラウチング（陸上競技で使う四つん這いの構え）の細かい技術は、ほぼ教えません。

代わりに、4要素を整える動きのドリル──縄跳び、ケンケン、スキップ、腿上げ（その場で膝を高く上げる動き）、壁を押す動き、方向転換──これらを、丁寧に、繰り返し、続けます。

そうして育った子たちには、ある共通点があります。

**スタートだけ見ると、他の子より少し遅く見える。**
**でも、走り出してから、ぐんぐん伸びる。**

100m走をやると、50mを通過したあたりから一気に他の選手を抜き返して、最後はトップで通過する。これが、うちの子たちの典型的なレース展開です。

なぜこうなるかというと、スタート技術は教えていないけれど、4要素の土台ができているので、走り出してからのトップスピードが他の子たちより高い位置にあるからです。最初の20mで負けても、残り80mで取り返せる。これは、土台の質の差です。

走り幅跳びでも、同じことが起きます。
助走の距離を知らない、踏切のタイミングも教わっていない、はずの子が、なぜか踏切板に足がぴったり合う。意外と遠くまで飛べる。着地だけはうまくいかないけれど、数回の中でコツを掴み、調整できる。

なぜか、ではなくて、4要素が身体に入っていると、**「正しく身体を扱う」ことの応用が利く**から、こうなるのです。

逆に、もうひとつ書いておきます。

足が速い子は、何もしなくても今のところは速い。
だから、ドリルを「自分はできるから」と適当に流してしまう子も、現場には少なからずいます。

そういう子は、ある時点から、伸びなくなります。今その学年ではトップでも、もう少し上の学年になると、丁寧にやってきた子たちに追い抜かれていく。
逆に、足が速い上にドリルを一つひとつ丁寧に重ねている子は、その学年で間違いなくトップクラスに伸びていく。

「速い／遅い」は、現状の話。
「丁寧にやっているか」は、未来の話。

これが、現場で何年も見てきて、私が一番自信を持って言える観察です。

## 親が我が子の走りを見るときの、正しい目線

最後に、保護者の方に持って帰っていただきたい「見方」の話をします。

走っているお子さんを見るとき、腕の振り、脚の動き、フォーム、目線──気になるところは無数にあると思います。

ただ、はっきり申し上げます。

**走りの細かい動作を見て"良い／悪い"を判断するのは、プロの私たちでも難しい仕事です。**

ですので、保護者の方が動作そのものを採点しようとするのは、おすすめしません。それは私たちに任せていただいたほうが、結果としてお子さんのためになります。

代わりに、保護者の方には、**ふだんの生活の中で、お子さんが「同じ動作を、連続で、安定して、何度も繰り返せているかどうか」を見ていただきたい**のです。

縄跳びを連続で200回跳べる子と、20回で止まってしまう子。
ケンケンを軽やかに30歩跳べる子と、5歩でフォームが崩れる子。

そこに、子どもの今の身体の発達度合いが、ものすごく素直に表れます。

そして、もし上手にできてリズムも姿勢も整っているように見えたら、**ほんの少しだけ"外乱"を入れてみてください**。「もう少し速くやってみて」「もう少し大きく跳んでみて」「歩幅を広めに」。

その状態でも崩れず続けられたら、その動きはもう本人の身体に入っています。少しの外乱で崩れるなら、まだ"なんとなくできている"段階です。**安定して再現できる動きこそが、本当に身につけた動き**。これは大人のトレーニングでも同じ原則です。

そしてもうひとつ、**やってほしくないこと**を3つ、はっきり書いておきます。

**① YouTubeでトップ選手の走り方の動画を見せて「これをやりなさい」と言うこと**

これは、足し算と引き算しかやっていない小学生に、いきなり因数分解の問題を解かせるのと同じです。身体の構造も、骨格も、筋肉量も、神経の発達段階もまったく違う選手の動きを、子どもの身体で再現できるはずがありません。再現しようとして、力みや変なクセを身体に入れてしまうほうが、はるかに大きな損失になります。

**② 同年代の速い子の動画を見せて「○○ちゃんはこうしてるよ」と言うこと**

これも、避けてください。本人と他人の差を子どもが自分で計算した瞬間、走るという行為そのものが「楽しいもの」から「比較されるもの」に変わります。自信を失った子は、本来出せるはずだったスピードを出せなくなります。

**③ 走り終わったあとに、フォームの細かい指摘をすること**

ここが一番、保護者の方が無意識にやってしまっていることです。

走り終わった直後にしてほしいのは、たった一つ。

**「今のどうだった？」**

これだけで十分です。

「良かった？　良くなかった？」と尋ねられたとき、子どもは一瞬、自分の走りを振り返ります。その振り返る瞬間そのものが、何より価値のある経験です。答えが正解かどうかは、本当にどうでもいい。

そして、子どもが自分で「もう少し○○したい」「どうしたらいいんだろう」と聞いてきたとき、初めて、何かを"教えるか／教えないか"を考えてあげてください。

子どもが自分で気づいて、自分で問いを立てた瞬間にだけ、大人の言葉は身体に届きます。

## 「教える」というのは、子どもにとって意外と難しい

第2章では、子どもの神経系が6歳から12歳のあいだにどう発達していくのか、その地図を見てきました。

ここから第3章でお話しするのは、そのゴールデンエイジに**大人が良かれと思って踏み込んでしまう関わり方**の話です。

最初にひとつ、正直に言わせてください。

**大人から「教えられたこと」を、自分の身体に落とし込む**——これは、子どもにとって意外なほどハードルの高い作業です。

外から入ってきた言葉や情報に、自分の姿勢・自分の感覚・自分のタイミングを適切に理解し、合わせようとすること。それは、大人が想像しているよりずっと難しい作業です。だから保護者の方が良かれと思ってやっている指導が、知らないうちに、子どもの能力や自然な成長を止めてしまうことが起きる。

ここで先に、この章で使う「教える」という言葉の意味を、定義させてください。

> この本で「教える」と言ったとき、私が指しているのは——**フォームを言葉で直接指示すること**（「腕は90度に」「膝を高く」「姿勢を伸ばして」）です。一方で、**「動きが自然に出てくるような課題を子どもに与えること」は、教えるではなく、きっかけ作りのための環境づくり**として扱います。
>
> 前者は子どもの自然学習を**止め**、後者は自然学習を**引き出す**。この区別が、この章の核心です。

ここを混同すると、章全体が「結局教えてるじゃないか」「じゃあ何もしなければいいのか」とねじれて読めてしまう。だから先に置いておきます。

もちろん、知識を入れること自体は大事です。ただ、伝える対象は「子ども」です。大人ではない。この当たり前のことを、まず意識してほしいと思います。

この本を読み終えたとき、私がいちばん願っているのは、**保護者・指導者の方が、子どもの前に「指導者」ではなく「応援者」として立てるようになることです。**

## 「綺麗だけど遅い子」、見たことありませんか？

腕の振り方も、膝の上げ方も、姿勢も——フォームは確かにきれい。見た目には「走れそう」に見える。

なのに、50m走のタイムを測ると、同学年の平均を下回る。

むしろ、指導を重ねるたびに記録が伸び悩み、ときには落ちていく。

「あ、うちの子それかも」

そう感じた方も、いるかもしれません。

これは私が現場で何度も目撃してきた、一定の割合で必ず出現するタイプの子どもです。

うちのパーソナルレッスンには、ときどきこんな相談が来ます。

「自分たちで陸上の走り方を勉強して、家でやらせているんですけど」

実際に見せてもらうと、確かに理にかなった、世にいう「綺麗な走り方」をしている子が多い。でも、その中のある男の子の走りを見ていて、私は気になりました。

綺麗に走ろうとするあまり、力が入るポイントがズレている。腕を前まで大きく振る、その動作に意識を取られて、本来「ここで力を出したい」という自分のタイミングや姿勢に、身体が慣れていない。だから、見た目は綺麗なのに、どこか力が抜けたままの走り方になっていた。

「気にせず、思い切って好きに走ってみよう。とにかく早く走るほうにフォーカスしてみよう」と声をかけて崩そうとしました。でも、その子の中ではすでに「綺麗に走る＝速い」という方程式が完成していて、なかなか崩せなかった。限られたパーソナルの時間内では、修正しきれませんでした。

ただ、誤解しないでほしいのは——これは「もう手遅れだ」という話ではありません。

> **家庭での声かけや関わり方が変わらない限り、レッスンの数十分で覆すのは難しい。逆に言えば、家庭の関わり方さえ変われば、子どもの走りは1〜2か月で目に見えて変わる**——これは現場で何度も確認してきた事実です。

最初、私もこの「綺麗だけど遅い」現象の理由がわかりませんでした。フォームが整っているなら、速くなるはずじゃないのか。教科書通りなら、その通り。でも実際の現場では、教科書通りに進まないケースが続発する。

指導記録を丁寧に追い直していくと、ある共通点に気づきました。

**「綺麗だけど遅い子」の多くは、幼いころから大人に丁寧に指導されてきた子だった。**

善意の、丁寧な、そして熱心な指導を、受けてきた子だった。

ここに子どもの発達の難しさが凝縮されていますし、熱心な保護者の皆様の想いを、お子様にとって最高のプレゼントにできるようになってほしい。そんな想いで、この内容を書かせていただいています。

## 子どもの身体は「自然に走る」ようにできている

なぜ、指導すればするほどタイムが落ちるのか。

これを理解するためには、まず**人間の身体が幼少期にどうやって運動を覚えていくか**——その仕組みを知る必要があります。

幼い子どもは、教わらなくても走ります。

転び、起き上がり、また走る。立ち上がろうとして、また転ぶ。その繰り返しの中で、身体は「効率よく動く方法」を**自分で**学んでいきます。

これを運動学では**「自然運動学習」**と呼びます。

神経系が未熟な幼少期の脳は、外から「正しい型」を入力されるよりも、**自分で失敗と修正を繰り返す方が、はるかに効率よく運動回路を組み上げていく**——という性質を持っています。

ここで、章の冒頭で置いた区別が効いてきます。**「言葉で直接指示する」のではなく、「動きが勝手に出てくる課題を与える」**——後者なら、自然学習を止めずに、むしろ引き出せる。

これを、現場の具体例で話します。

たとえば、足の使い方を考えてみてください。「足をまっすぐ下ろして」と言葉で伝えても、なかなか伝わらない。でも、

**ミニハードルの向こうにスポンジを置いて、「上から踏みつぶしてみて」**

と課題に置き換えると、子どもは上からドシンと、しっかり踏みつぶせるようになる。地面に的確に力を加える感覚が、勝手に育っていく。

ミニハードルの連続跳び越しも同じで、「足首を固めて」と言葉で教えるのではなく、ハードルをゲーム感覚で連続でクリアさせる。すると、SSC（地面からの反発をバネのように使う動き）が、勝手に引き出されてくる。

スタートの構えも、「低い姿勢で」と言うと下を向いてしまう子が多い。だから言葉を変えます。

**「天井がすごく低い建物の中を、ぶつからないように全力で走り抜けてみて」**と、手や柔らかいもので頭上の高さを実際に見せてあげる。

これだけで、子どもの目線も姿勢も、一気にいい状態になる。

> ポイントは「動きを言葉で説明する」のではなく、「動きが勝手に出てくる課題」を与えること。

これが、自然運動学習を引き出すコツです。

逆に、言葉で直接フォームを指示してしまった瞬間に、走りがまるごと崩れた経験も、たくさんあります。「足を高く上げて」と言ったら、後ろに体が倒れた。姿勢が崩れた。指導を始めたばかりの頃、これでよく悩みました。

そして、ここでもうひとつ大事なことがあります。同じ課題、同じ言葉をかけても、**子どもによって反応の仕方がまったく違う**んです。現場で観察していると、子どもには大きく分けて2つのタイプがいる——ということが、はっきり見えてきます。

**ひとつ目は「身体で覚えていく子」。**
何でもとりあえずやってみる。こちらが伝えた瞬間に、その場でポンポンと試す。横で真似をしてくる。動きが先、言葉は後、という子です。

**ふたつ目は「頭で覚えようとする子」。**
質問が返ってくる。「これってどういうこと？」「もっと上げるの？」「足ってこれくらい？」——言葉で確認してから動こうとする。理解が先、動きは後、という子です。

どちらも、やる気はある子たちです。タイプの違いそのものに優劣はありません。

ただ、両方のタイプを引き上げる関わり方は同じです——**先ほど紹介した「動きが自然に引き出される課題」を渡すこと。**身体で覚える子は、課題に飛び込んでそのまま身体で答えを見つける。頭で覚える子も、課題に取り組む過程で「あ、こういうことか」と自分で発見していく。

言葉で直接フォームを指示する関わり方は、どちらのタイプにも効きにくい。でも、課題で引き出す関わり方は、どちらのタイプにも効く。これが、現場で何年も繰り返し確認してきたことです。

## 「正しい動き」を教えると、子どもの脳に何が起きるか

ここに、丁寧な大人ほど踏み込んでしまう落とし穴があります。

「腕は90度に曲げて」「膝をもっと高く上げて」「背筋を伸ばして」「目線は前」

大人が言う「正しいフォーム」を子どもに意識させると、子どもの脳の中では何が起きるのか。

**意識が、フォームに向きます。**

走ることへの意識——本来は前へ進むこと、地面を蹴ること、風を切ること——その意識が、「腕は今90度になっているか」「膝はちゃんと上がっているか」「背中は曲がっていないか」の**自己チェック**に使われるようになる。

走るという動作は、本来ほぼ無意識で行われるものです。熟練したランナーが走るとき、腕の角度を意識していることはほとんどない。身体が自動的に、その瞬間その瞬間に最適な動きを選んでいる。

ここで、もうひとつ大事な区別を置いておきます。

> **「意識」には、3つの階層があります。**
>
> **① 事前準備としての意識**（リズムの設計、完成形のイメージ化、目的の言語化）— これはOK、むしろ必要。
> **② 動作中のフォームチェック**（今、腕は90度か／膝は上がっているか）— これが、速さの妨げになる。
> **③ 走り終わった後のヒアリング・振り返り**（さっきの走り、どう感じた？／設計通りだった？）— これもOK、次の①につながる大切な習慣。
>
> 子どもに起きやすいブレーキは、ほぼ②に偏っています。

①は走る「前」に、完成図と計画を描いておく作業。②は走っている「最中」に、コマ送りで自分をチェックする作業。③は走った「後」に、設計と実際を答え合わせする作業。同じ「意識する」という言葉でも、①③と②はまったく別物です。

ここから少し、私自身の競技経験の話をします。あらかじめお断りしておきますが、これからお話しするのは、**トップアスリートとして長く競技に向き合う中で、時間をかけて身につけた熟練度があるからこそ言える**話です。同じことを子どもに求めているわけではありません。「身体は本来こういう動かし方で最大のパフォーマンスを出す」という事実を、ひとつの参考として読んでいただければと思います。

棒高跳びの試合で何を意識して、何を意識していなかったかを、少し正直に話します。

助走で意識していたのは、**歩数とリズム**でした。何歩目で身体がどうなっているか、どこでスピードに乗りやすいか乗りにくいか。そのリズムが、序盤で早くなりすぎていないか、終盤で「ちぐはぐ」になっていないか。これは①——**事前に設計した計画に乗っていたかを、試技後に確認するための意識**です。

でも、踏み切る瞬間や、バーをクリアする瞬間そのものは、**まったく意識していませんでした。**②のフォームチェックは一切やっていない。

正確に言うと——私の場合は、頭の中で「踏み切ったらこういう景色になるはず」「クリアの瞬間はこういう感覚になるはず」という**映像と感覚を、最初に流す**ことをしていた。スタート前に、ビデオの再生みたいに、自分の動きの完成形を頭の中に放り込む。そこに、自分の身体を合わせていくイメージでした。これも①の意識です。

> 言葉で「こう動かす」と頭に残すのではなく、完成した映像と感覚を、先にインストールする。

そして試技が終わった直後には、必ず**③の振り返り**をしていました。リズムは設計通りだったか、踏み切りの感触はイメージとどうズレていたか。それを次の試技の①（事前設計）にフィードバックしていく。①→②なし→③→次の①、というループです。

逆に、意識しすぎて失敗した経験もあります。練習で「ポールを高めに持つべきか低めに持つべきか」「ラストの一歩でどう動くべきか」——細かいポイントをひとつずつ考えながら走ると、逆にうまくいかない。これは②に踏み込んでしまった例です。試合本番は集中力で考え事が消えるのでマシでしたが、練習ではよく崩れていました。

そして、すべてがハマったときの感覚——いわゆる「ゾーン」と呼ばれるもの——は、私にとってはこういう感覚でした。

**自分の感覚が研ぎ澄まされて、見えていないはずの場所のものまで、感じ取れる。**

踏み切った後にポールがどう曲がっていくか、自分の身体の角度、バーまでの位置——それらが3D（立体）で、ふんわりと包括的に見える。そのイメージの中を、自分の身体が通っていく。**「ああ、これは失敗しないな」**と、跳ぶ前にわかる。失敗するときも、「こう失敗するな」というイメージが先に出ていて、実際の動きとズレがない。

こういう感覚で動けているとき、人間の身体は**②の意識（動作中のチェック）が、ほぼゼロになっている。**

子どもにとっての「速く走れている瞬間」も、これと同じ構造です。②の意識が混じった瞬間に、この感覚は消える。

ところが、指導によって「動作中も意識的に身体を動かす」癖がついた子どもは、走りながら常に**フォームチェックモード**で走ることになる。

**結果、動きが「きれい」になる代わりに、自然に出ていたはずのスピードが出なくなる。**

これが「綺麗だけど遅い子」の正体です。

## YouTubeフォーム動画が、子どもの年齢で害が変わる理由

ここ数年で大きく変わったのが、YouTubeやSNSで、かけっこの技術指導動画が爆発的に増えたことです。

「腕をこう振ると速くなる」「スタートはこう構えて、こう蹴り出す」——内容そのものは、多くの場合、技術的には**正しい**。

正しい。でも、その「正しい指導」が**誰に向けて発信されているか**を考えてみてください。

ほとんどの技術解説動画は、神経系がすでに成熟した大人や、競技を志す中高生以上を念頭に作られています。それを、神経系がまだ発達途上の子どもに当てはめたとき、何が起きるか——これは**年齢によって、起こる害がはっきり違います。**

### 小学校低学年で起きること

> 小学校低学年の脳は、まだ「正確な技術」を意識的に取り込むようには設計されていない。

この時期に大人と同じ「正確な技術」を意識的に入力しても、神経回路がそれを処理しきれません。それどころか、「意識して動かす」癖がつくことで、本来この時期にもっとも必要な**自然運動学習の機会**が奪われてしまう。

低学年で動画指導の害がいちばん深刻なのは、ここです。**本来は自分で発見すべきものを、外から先に教えられてしまう。**その結果、「自分の身体で気づく」回路の発達そのものが止まる。

これは「動画が悪い」という話ではありません。**動画を見る対象の年齢が問題**なのです。

### 小学校高学年〜中学生で起きること

高学年や中学生になると、神経系の準備はある程度整います。だから動画から学ぶこと自体は、本来は可能になってくる。

ところが、現場でこの年齢層の陸上好きな子と話していると、こういう言葉がよく出てきます。

「○○選手みたいな走り方を意識してます」

これ自体は、自然な憧れです。でも、現場で見ていると、そういう子に**一定パターンの問題**が起きていることに気づきます。

その選手に「乗せていきたい」という意識が強いあまり、自分の身体のタイミングや、自分の得意な感覚を**無視している**んです。結果として——

**その選手の「いいところ」ではなく、副産物的に出ている「良くないところ」まで、形だけマネしている。**

これが、いちばん多いパターンです。

逆に、動画を見ていない子たちは、ある意味めちゃくちゃな走り方に見えることがあります。でも、よく見ると下半身の動きと上半身が、不思議とちゃんと連動している。

ひとつの目安として、**小学生で「綺麗に腕を振っている」状態は、何かしら修正が入った形跡**だと、私は見ています。腕振りそのものは、いずれ直すべきタイミングが来るし、直したほうがいい時期も来る。**でも、それは小学生のうちにわざわざフォーカスして直すべきことではない**、というのが私の感覚です。

### 動画を見ている子から相談されたとき

動画を毎日見ている子から「この選手を意識してるんですけど、どうですか？」と聞かれることがあります。

そういうときに私が最初に聞くのは、ひとつだけ。

> 「何がしたくて、それをやってるの？」

その答えが、明らかにその子自身の能力とかけ離れている場合は、「気にせず、いったん自分のままやってみたらいいんじゃない？」と伝えます。

ただし、私は否定はしません。陸上競技との関わり方は、子どもそれぞれの楽しみ方があっていい。だから「あなたはこういう走り方の方がうまくいくと思うよ、なぜならこうだから。でもやってみて気が乗ったら続けてみたら？」と、**必ず逃げ道を残して**伝えるようにしています。

保護者の方には、もし聞かれたら、こうお伝えしています。

「将来的には、選手のフォームを参考にするタイミングは絶対に来ます。でも今は、もう少し**伸び伸び走りたい気持ちを育てる**ほうが、長期的にはずっとプラスです」

やんわりと、押し付けずに。これが現場での実際の伝え方です。

## 現場で見た「指導をやめたら伸びた」という現実

「教えなかったから伸びた」エピソードを話してください、と編集で言われて、ふと思ったことがあります。

**そもそも私、言葉での細かいフォーム指示は、ほとんどしていないんです。**

うちのSORAスクールでは、子どもたちと会うのは月3回。10日に1回しか、私は子どもの走りに関わっていません。会っているときも、前章でお話しした「ブン！と棒を振らせる」「スポンジを踏みつぶす」「天井が低い建物を走り抜ける」のような**課題を渡して、一緒に動く**だけ。

特別なことはしていません。月3回、課題を渡して一緒に動いて、あとは家庭にお返しする。それだけです。

それでも——というか、それだからこそ、結果は出ます。

スクールに通い始めて1〜2年経つと、**学校の体力テストで最高判定を取って表彰された**という報告が、本当に高頻度で届きます。それも、元から運動が得意だった子だけではない。「うちの子、運動が苦手で……」と相談で入ってきた子たちが、1〜2年後にはほぼ最高ランクの結果を出している。

私は、何をしたか？

**フォームを言葉で直接指示することは、していない。**やったのは、自然に動きが引き出される課題を渡したことと、子どもが楽しく取り組める空気をつくったこと。それだけです。

報告を受けたときに私が言うのも、動きの指導ではありません。

「良かったね。何が良くなった感じがした？」
「他にやってみたいこと、出てきた？」
「じゃあ今度は投げる練習もしてみようか」

——こんな感じです。**動きを直すのではなく、挑戦の幅を広げる声かけ。**それだけ。

「指導をやめてください」と保護者に直接お願いすることも、基本的にはありません。家庭の関わり方に、こちらから踏み込むことはあまりしないからです。

> 「言葉で細かく直さないこと」「関わりすぎないこと」——これ自体が、すでに私の指導法の核です。

子どもの走りを取り戻すために最初にすべきことは、技術を「足す」ことではなく、過剰に入っていた意識を**「引く」**ことだった——というケースが、現場には驚くほど多いんです。

## 「綺麗さ」と「速さ」、年齢ごとに優先順位は変わる

ここまで読んで「じゃあフォームを教えるのは、いつから？」と疑問を持たれた方も多いと思います。

これは年齢によって、答えがはっきり変わります。現場感覚での目安をまとめます。

| 年齢 | 優先すること | 大人の役割 |
|------|------------|-----------|
| 〜小学2年生 | 走ることを楽しむ／自然な動きの蓄積 | 見守る・褒める・邪魔しない |
| 小学3〜4年生 | 動きの「感覚」に自分で気づく | 問いかける・観察する |
| 小学5〜6年生〜 | 具体的な技術の入力が少しずつ可能に | 丁寧な指導を、少しずつ加える |

幼ければ幼いほど、「正しいフォームを教える」ことより**「走ることが楽しい」「自分の身体は動かせる」という感覚そのもの**を育てる方が、長期的な運動能力の発達に直結します。

フォームの美しさを意識的に求めるのは、もう少し後でいい。具体的に「いつ・どうフォームを育てるか」については、第8章でじっくりお話しします。

ここで覚えてほしいのは一点だけ。

> 幼少期にフォームを「教える」のではない。フォームは「育つ」のを待つ。

この受け身に見える関わり方こそが、実は子どもの発達原理にもっとも忠実な、能動的な選択なのです。

## 「ちゃんと走ろうとしすぎている」サインを見抜く

ここまで読んできた方の中には、「うちの子は大丈夫だろうか？」と気になってきた方もいるかもしれません。

「綺麗だけど遅い子」パターンが進行している子どもには、見た目や走り方に共通したサインが現れます。現場で私が観察しているポイントを、整理してお伝えします。

**サイン1：スタートで動けない・動きがゆっくりになる**

本来ならゴーの合図で勢いよく前へ出るはずなのに、なかなか出ない。動き出しても、明らかにペースが落ちている。「ちゃんとスタートしなきゃ」という意識が、最初の一歩を止めてしまうパターンです。

**サイン2：動きがぎこちなく、本来できていた動作が急にできなくなる**

普段の遊びでは普通にできていたはずの動きが、「測られる場面」になると急に崩れる。これは、本番のプレッシャーで「ちゃんと走らなきゃ」というスイッチが入る典型です。

**サイン3：身体が小さくなる・目線が下がる**

全身が縮こまった印象になる。自分の身体（特に足）を見たくなって、目線が地面に落ちる。これが続くと、走りの推進力そのものが失われていきます。

**サイン4：走り終わったあと、ネガティブな言葉が増える**

走っている最中の表情はむしろワクワクしている子も多いんですが、終わったあとに口から出てくる言葉が、「難しい」「できない」と、ネガティブに偏ってくる。

> 「最初からできるわけないじゃない」
> 「できないから練習するんだよ」
> 「続けてたら絶対できるようになるから、ちょっとずつやってみよう」

こういう声かけを返していきますが、ここで止められないと、次の段階に進みます。

**赤信号：考えすぎてしょんぼり、チャレンジしなくなる**

「もうやりたくない」「自分はできない」と、行動そのものをやめてしまう。**この段階に来ている場合は、技術指導を完全にいったん止めて、走ること自体への気持ちを取り戻すところから、やり直す必要があります。**

保護者の方への提案として——もしお子さんに2つ以上のサインが当てはまったら、**まず1か月、技術的な声かけを完全にゼロにしてみてください。**「フォーム」「腕」「膝」「姿勢」——こういう言葉を、家庭からまるごと消す。代わりに「楽しかった？」「今日いちばん気持ちよかった瞬間は？」だけ。

たった1か月で、子どもの走りは目に見えて変わります。

## それでも「何かしたい」親御さんへ、たった一つの関わり方

「何もしないのが正解」と聞くと、多くの保護者の方は逆に不安になります。

「本当に何もしなくていいのか？」「うちの子だけ遅れるんじゃないか？」

その気持ち、よくわかります。だから、何もせずに見守る、ではなく——**「口出しの代わりに、一言だけ問いかける」**という関わり方を提案します。

子どもが走り終わった後に、こう聞いてみてください。

> 「今日の走り、自分でどうだった？」

結果を評価するのでも、フォームを指摘するのでもない。子ども自身が「どう感じたか」を**言語化する機会**を作る。

たったそれだけです。

でも、この一言には大きな力があります。子どもは「走った直後の自分の身体の感覚」を、自分の言葉で取り出そうとする。「速かった」「気持ちよかった」「足がぐらついた」「呼吸が苦しかった」——どんな表現でも構いません。

身体感覚を**言語化する習慣**こそが、自分の走りを自分で修正していく能力の土台になります。

技術を「教える」のではなく、子どもが「気づく」のを待つ。フォームを「直す」のではなく、本人の感覚を「引き出す」。

それが、発達段階に最も忠実な関わり方です。

## 善意の指導から、どう降りるか

最後に、ここまで読んで「自分はやってしまっていたかもしれない」と感じた方へ、一つお伝えしたいことがあります。

これまで丁寧に指導してきた親御さんを、責めたいわけではありません。あなたは、子どものために、できることをしてきた。それは紛れもなく、愛情と熱意の結果です。

ただ、子どもの発達には**順番**があります。

そして、その順番を守ろうとするとき、親ができる最高の関わり方は、「何もしないこと」ではなく**「子どもが自分で気づくのを待つこと」**——これが正解です。

明日、お子さんが走り終わった後、フォームの話をする前に、一言だけ聞いてみてください。

「今日の走り、自分でどうだった？」

それだけでいい。

> **その一言を口にできた瞬間、あなたは「指導者」から「応援者」に降りています。それが、子どもの10年後を変える、最初の一歩です。**

/* ─── STATE ─── */
let state = {}, currentFilter = -1;
function loadState(){
  try{ const s=localStorage.getItem('ogilab_note_v3'); if(s) state=JSON.parse(s); }catch(e){}
  CHAPTERS.forEach(ch=>{ if(!state[ch.id]) state[ch.id]={step:0,chars:0,memo:'',tab:'points'}; });
}
function save(){
  localStorage.setItem('ogilab_note_v3',JSON.stringify(state));
  document.getElementById('lastSaved').textContent=new Date().toLocaleTimeString('ja-JP');
}
function setStep(id,s){ state[id].step=s; save(); renderAll(); }
function advanceStep(id){ if(state[id].step<6){ state[id].step++; save(); renderAll(); } }
function updateChars(id,v){ state[id].chars=parseInt(v)||0; save(); updateProgress(); }
function updateMemo(id,v){ state[id].memo=v; save(); }
function switchTab(id,t){ state[id].tab=t; save();
  document.querySelectorAll('#tabs-'+id+' .tbtn').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  document.querySelectorAll('#panes-'+id+' .tab-pane').forEach(p=>p.classList.toggle('active',p.dataset.p===t));
}
function toggleDetail(id){ document.getElementById('det-'+id).classList.toggle('open'); }
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c=>{ c.style.display=(f===-1||parseInt(c.dataset.step)===f)?'':'none'; });
}
function updateProgress(){
  const c=[0,0,0,0,0,0,0]; let tot=0;
  CHAPTERS.forEach(ch=>{ c[state[ch.id].step]++; tot+=state[ch.id].chars||0; });
  const pct=Math.round((c[6]/CHAPTERS.length)*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('s-none').textContent='⬜ '+c[0]+' 未着手';
  document.getElementById('s-struct').textContent='📐 '+c[1]+' 構成OK';
  document.getElementById('s-rec').textContent='🎙 '+c[2]+' 録音待ち';
  document.getElementById('s-review').textContent='📝 '+c[3]+' 精査中';
  document.getElementById('s-final').textContent='🔍 '+c[4]+' 最終確認';
  document.getElementById('s-thumb').textContent='🖼 '+c[5]+' サムネ';
  document.getElementById('s-done').textContent='✅ '+c[6]+' 完成';
  document.getElementById('total-chars').textContent=tot.toLocaleString();
}

/* ─── MARKDOWN RENDERER ─── */
function md2html(text){
  if(!text) return '';
  const lines = text.split('\n');
  let html = '', inUl=false, inOl=false, inBq=false, inPara=false;
  const closePara=()=>{ if(inPara){html+='</p>';inPara=false;} };
  const closeUl=()=>{ if(inUl){html+='</ul>';inUl=false;} };
  const closeOl=()=>{ if(inOl){html+='</ol>';inOl=false;} };
  const closeBq=()=>{ if(inBq){html+='</blockquote>';inBq=false;} };
  const closeAll=()=>{ closePara(); closeUl(); closeOl(); closeBq(); };
  const inline=s=>s
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>');
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(/^#{1} /.test(l)){ closeAll(); html+=`<h2>${inline(l.replace(/^# /,''))}</h2>`; continue; }
    if(/^#{2} /.test(l)){ closeAll(); html+=`<h2>${inline(l.replace(/^## /,''))}</h2>`; continue; }
    if(/^#{3} /.test(l)){ closeAll(); html+=`<h3>${inline(l.replace(/^### /,''))}</h3>`; continue; }
    if(/^---+$/.test(l.trim())){ closeAll(); html+='<hr>'; continue; }
    if(/^> /.test(l)){
      if(!inBq){ closePara(); closeUl(); closeOl(); html+='<blockquote>'; inBq=true; }
      html+=`<p>${inline(l.replace(/^> /,''))}</p>`; continue;
    } else { closeBq(); }
    if(/^[-*] /.test(l)){
      if(!inUl){ closePara(); closeOl(); html+='<ul>'; inUl=true; }
      html+=`<li>${inline(l.replace(/^[-*] /,''))}</li>`; continue;
    } else { closeUl(); }
    if(/^\d+\. /.test(l)){
      if(!inOl){ closePara(); closeUl(); html+='<ol>'; inOl=true; }
      html+=`<li>${inline(l.replace(/^\d+\. /,''))}</li>`; continue;
    } else { closeOl(); }
    if(l.trim()===''){
      closeAll(); continue;
    }
    if(l.includes('⚠️')||l.includes('※')){
      closeAll(); html+=`<div class="todo-note">${inline(l)}</div>`; continue;
    }
    if(!inPara){ html+='<p>'; inPara=true; } else { html+=' '; }
    html+=inline(l);
  }
  closeAll();
  return html;
}
function countChars(text){ return text ? text.replace(/\s/g,'').length : 0; }

/* ─── PIPELINE RENDER ─── */
function pipelineHTML(id){
  const cur = state[id].step;
  let html='<div class="pipeline" onclick="event.stopPropagation()">';
  STEPS.forEach((s,i)=>{
    if(i>0) html+=`<div class="step-line ${i<=cur?'done':''}"></div>`;
    const isDone=i<cur, isActive=i===cur;
    html+=`<div class="step-node" title="${s.label}" onclick="setStep(${id},${i})">
      <div class="step-dot ${isDone?'done':''} ${isActive?'active':''}">${isDone?'✓':s.icon}</div>
      <div class="step-label">${s.short}</div>
    </div>`;
  });
  return html+'</div>';
}

  const srcMeta={
    reuse:{ icon:'✅', cls:'src-reuse', label:'転用' },
    remix:{ icon:'🔄', cls:'src-remix', label:'再構成' },
    new:  { icon:'🎙', cls:'src-new',   label:'新規録音' },
  };
  const structHTML = ch.voirec.structure ? `
    <div class="struct-box">
      <h4>📋 章の構成案 — 何が揃っていて何が必要か</h4>
      <div class="struct-legend">
        <span class="legend-item"><span class="legend-dot ld-reuse"></span>✅ 転用可（既存記事から）</span>
        <span class="legend-item"><span class="legend-dot ld-remix"></span>🔄 再構成（改変して使用）</span>
        <span class="legend-item"><span class="legend-dot ld-new"></span>🎙 新規（ボイレコ必要）</span>
      </div>
      <div class="struct-rows">
        ${ch.voirec.structure.map(row=>{
          const m=srcMeta[row.src]||srcMeta.new;
          return `<div class="struct-row ${m.cls}">
            <div class="struct-icon">${m.icon}</div>
            <div class="struct-num">${row.num}</div>
            <div class="struct-body">
              <div class="struct-title">${row.title}${row.src==='new'?'<span class="new-badge">要録音</span>':''}</div>
              <div class="struct-desc">${row.desc}</div>
              <div class="struct-ref">${row.ref}</div>
            </div>
            <div class="struct-chars">${row.chars.toLocaleString()}字</div>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--text2)">
        合計目標：<strong style="color:var(--text)">${ch.voirec.structure.reduce((a,r)=>a+r.chars,0).toLocaleString()}字</strong>
        ／ 新規録音：<strong style="color:var(--purple)">${ch.voirec.structure.filter(r=>r.src==='new').reduce((a,r)=>a+r.chars,0).toLocaleString()}字分</strong>
        ／ 転用・再構成：<strong style="color:var(--green)">${ch.voirec.structure.filter(r=>r.src!=='new').reduce((a,r)=>a+r.chars,0).toLocaleString()}字分</strong>
      </div>
    </div>` : '';

  /* pipeline detail cards */
  const pipeCards=STEPS.map((st,i)=>`
    <div class="pipe-step-card ${i===cur?'current-step':''} ${i<cur?'completed-step':''}"
      onclick="event.stopPropagation();setStep(${ch.id},${i})">
      <div class="psc-header">
        <span class="psc-num ${st.col}">${i<cur?'✓':st.icon}</span>
        <span class="psc-title">${st.label}</span>
      </div>
      <div class="psc-desc">${st.desc}</div>
      ${st.action?`<div class="psc-action">${st.action}</div>`:''}
    </div>`).join('');

  card.innerHTML=`
    <div class="card-top" onclick="toggleDetail(${ch.id})">
      <div class="ch-num">第<span>${ch.id}</span>章</div>
      <div>
        <div class="ch-title">${ch.title}</div>
        <div class="ch-sub">${ch.sub} ／ 目標 ${ch.target.toLocaleString()}字</div>

            <div>
              <div class="sec-title">この章で書くこと</div>
              <ul class="point-list">${ch.points.map(p=>`<li>${p}</li>`).join('')}</ul>
            </div>
            <div>
              <div class="sec-title">既存note記事との紐付け</div>

        </div>

        <div class="tab-pane ${tab==='voirec'?'active':''}" data-p="voirec">

            if(!draftSrc) return `<div class="draft-empty">この章の本文はまだありません。ボイレコ後に執筆が始まります。</div>`;
            const charCount = countChars(draftSrc);
            const needsRec = draftSrc.includes('要ボイレコ') || draftSrc.includes('たたき台');
            const rendered = md2html(draftSrc);
            return `
              <div class="draft-stats">
                <span class="draft-stat">文字数（空白除く）: <strong>${charCount.toLocaleString()}字</strong></span>

              </div>
              <div class="draft-wrap">${rendered}</div>`;
          })()}

        <div class="tab-pane ${tab==='memo'?'active':''}" data-p="memo">

              <div class="save-hint">変更は自動保存されます</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  `;
  return card;
}

function renderAll(){
  const list=document.getElementById('list'); list.innerHTML='';
  CHAPTERS.forEach(ch=>{
    const card=renderCard(ch);
    if(currentFilter!==-1 && state[ch.id].step!==currentFilter) card.style.display='none';
    list.appendChild(card);
  });
  updateProgress();
}

loadState(); renderAll();
</script>
</body>
